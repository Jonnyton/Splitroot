<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>SPLITROOT Approved Assets</title>
  <style>
    :root {
      --bg: #f6f3ec;
      --panel: #fffdf8;
      --ink: #202226;
      --muted: #626867;
      --line: #d8d1c3;
      --green: #2f6f53;
      --cyan: #1f6d7a;
      --ochre: #8b6828;
      --rust: #9b4632;
      --soft: #ece7da;
    }

    * { box-sizing: border-box; }

    html,
    body {
      max-width: 100%;
      overflow-x: hidden;
    }

    body {
      margin: 0;
      color: var(--ink);
      background: var(--bg);
      font-family: "Segoe UI", Arial, sans-serif;
      line-height: 1.45;
    }

    header {
      padding: 28px 32px 18px;
      border-bottom: 1px solid var(--line);
      background: var(--panel);
    }

    .nav {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      margin-bottom: 14px;
    }

    .nav a {
      border: 1px solid #bdb4a3;
      background: #fffefb;
      color: #173f47;
      border-radius: 6px;
      padding: 8px 10px;
      text-decoration: none;
      font: inherit;
      max-width: 100%;
    }

    .nav a:hover { background: #efe7d6; }

    h1 {
      margin: 0 0 8px;
      font-size: 34px;
      font-weight: 700;
      letter-spacing: 0;
      line-height: 1.15;
      overflow-wrap: anywhere;
    }

    .lede {
      max-width: 960px;
      margin: 0;
      color: var(--muted);
      font-size: 15px;
      overflow-wrap: anywhere;
    }

    .toolbar {
      display: grid;
      grid-template-columns: minmax(220px, 1fr) repeat(3, minmax(140px, 180px));
      gap: 10px;
      padding: 14px 32px;
      background: #ebe4d5;
      border-bottom: 1px solid var(--line);
      position: sticky;
      top: 0;
      z-index: 3;
    }

    input,
    select {
      width: 100%;
      min-height: 38px;
      border: 1px solid #bdb4a3;
      border-radius: 6px;
      background: #fffefb;
      color: var(--ink);
      padding: 8px 10px;
      font: inherit;
    }

    main {
      padding: 20px 32px 42px;
    }

    .summary {
      display: grid;
      grid-template-columns: repeat(5, minmax(120px, 1fr));
      gap: 10px;
      margin-bottom: 18px;
      min-width: 0;
    }

    .metric {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      padding: 12px;
    }

    .metric b {
      display: block;
      font-size: 24px;
      margin-bottom: 2px;
    }

    .metric span {
      color: var(--muted);
      font-size: 13px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(min(300px, 100%), 1fr));
      gap: 14px;
      min-width: 0;
    }

    .asset {
      border: 1px solid var(--line);
      border-radius: 8px;
      background: var(--panel);
      overflow: hidden;
      min-height: 100%;
      display: flex;
      flex-direction: column;
      min-width: 0;
    }

    .asset img,
    .image-fallback {
      width: 100%;
      aspect-ratio: 16 / 9;
      object-fit: cover;
      background: #2b2d2c;
      color: #f7f0dd;
      display: grid;
      place-items: center;
      font-size: 13px;
      text-align: center;
      padding: 12px;
    }

    .body {
      padding: 12px;
      display: grid;
      gap: 9px;
    }

    h2 {
      margin: 0;
      font-size: 18px;
      line-height: 1.25;
      letter-spacing: 0;
      overflow-wrap: anywhere;
    }

    a {
      color: #0f5d73;
      text-decoration: none;
      word-break: break-word;
    }

    a:hover { text-decoration: underline; }

    .chips {
      display: flex;
      flex-wrap: wrap;
      gap: 6px;
    }

    .chip {
      border-radius: 6px;
      padding: 3px 7px;
      font-size: 12px;
      background: var(--soft);
      color: #353736;
      border: 1px solid #d2c8b7;
      max-width: 100%;
      overflow-wrap: anywhere;
    }

    .chip.approved_asap { background: #dfecd8; border-color: #a8c49d; color: #204f34; }
    .chip.approved_selective { background: #e0eef0; border-color: #9cc0c7; color: #164f59; }
    .chip.approved_local_library { background: #f0e5cb; border-color: #d1b56d; color: #624916; }
    .chip.ai { background: #f4dfd7; border-color: #c98978; color: #7a2f20; }
    .chip.thumbnail { background: #eef0f1; border-color: #bdc5c8; color: #35454a; }

    .label {
      color: var(--muted);
      font-size: 12px;
      text-transform: uppercase;
    }

    .value {
      font-size: 14px;
      overflow-wrap: anywhere;
    }

    .rejected {
      margin-top: 28px;
      border-top: 1px solid var(--line);
      padding-top: 18px;
    }

    .rejected-list {
      display: grid;
      gap: 8px;
    }

    .rejected-item {
      border: 1px solid #c99b8e;
      border-radius: 8px;
      background: #fff8f5;
      padding: 10px 12px;
    }

    @media (max-width: 860px) {
      header, main { padding-left: 18px; padding-right: 18px; }
      .toolbar { grid-template-columns: 1fr; padding-left: 18px; padding-right: 18px; }
      .summary { grid-template-columns: repeat(2, minmax(120px, 1fr)); }
      h1 { font-size: 28px; }
    }

    @media (max-width: 420px) {
      header {
        width: 100vw;
        max-width: 100vw;
        padding: 18px 16px 14px;
      }
      main {
        width: 100vw;
        max-width: 100vw;
        padding-left: 16px;
        padding-right: 16px;
      }
      .toolbar {
        width: 100vw;
        max-width: 100vw;
        padding-left: 16px;
        padding-right: 16px;
      }
      .nav { gap: 8px; }
      .nav a { font-size: 14px; padding: 7px 9px; }
      h1 { font-size: 24px; }
      h1,
      .lede { max-width: calc(100vw - 32px); }
      .summary { grid-template-columns: 1fr; }
    }
  </style>
  <script src="approved_assets.data.js"></script>
</head>
<body>
  <header>
    <nav class="nav" aria-label="Registry navigation">
      <a href="unit_roster.html">Unit and Item Roster</a>
      <a href="unit_ledger.md">Unit Ledger Markdown</a>
      <a href="unit_ledger.json">Unit Ledger JSON</a>
    </nav>
    <h1>SPLITROOT Approved Assets</h1>
    <p class="lede">Standing approval registry for unit, item, and map-building sessions. The cards below render the approved URLs, local status, current use, and unit-ledger notes from <code>approved_assets.data.js</code>.</p>
  </header>

  <section class="toolbar" aria-label="Asset filters">
    <input id="search" type="search" placeholder="Search title, URL, use, faction">
    <select id="approval">
      <option value="">All approvals</option>
      <option value="approved_asap">Approved ASAP</option>
      <option value="approved_selective">Approved selective</option>
      <option value="approved_local_library">Approved local library</option>
    </select>
    <select id="lane">
      <option value="">All lanes</option>
      <option value="units">Units</option>
      <option value="items">Items</option>
      <option value="map">Map</option>
      <option value="vfx">VFX</option>
    </select>
    <select id="faction">
      <option value="">All factions</option>
      <option value="VerdantChoir">Verdant Choir</option>
      <option value="KinwildCovenant">Kinwild Covenant</option>
      <option value="LenswrightCompact">Lenswright Compact</option>
      <option value="neutral">Neutral</option>
    </select>
  </section>

  <main>
    <section class="summary" id="summary"></section>
    <section class="grid" id="grid"></section>
    <section class="rejected">
      <h2>Not Approved</h2>
      <div class="rejected-list" id="rejected"></div>
    </section>
  </main>

  <script>
    const registry = window.SPLITROOT_APPROVED_ASSETS;
    const assets = registry.assets;
    const filters = {
      search: document.getElementById("search"),
      approval: document.getElementById("approval"),
      lane: document.getElementById("lane"),
      faction: document.getElementById("faction")
    };

    const approvalLabels = {
      approved_asap: "Approved ASAP",
      approved_selective: "Approved selective",
      approved_local_library: "Approved local library"
    };

    function textIncludes(asset, needle) {
      if (!needle) return true;
      const haystack = [
        asset.title,
        asset.url,
        asset.current_use,
        asset.notes,
        asset.local_status,
        ...(asset.lanes || []),
        ...(asset.factions || [])
      ].join(" ").toLowerCase();
      return haystack.includes(needle);
    }

    function filteredAssets() {
      const needle = filters.search.value.trim().toLowerCase();
      const approval = filters.approval.value;
      const lane = filters.lane.value;
      const faction = filters.faction.value;
      return assets.filter(asset =>
        (!approval || asset.approval === approval) &&
        (!lane || (asset.lanes || []).includes(lane)) &&
        (!faction || (asset.factions || []).includes(faction)) &&
        textIncludes(asset, needle)
      );
    }

    function chip(text, extraClass = "") {
      const span = document.createElement("span");
      span.className = `chip ${extraClass}`.trim();
      span.textContent = text;
      return span;
    }

    function renderSummary(list) {
      const counts = [
        ["Showing", list.length],
        ["Approved URLs", assets.length],
        ["Unit lane", assets.filter(a => a.lanes.includes("units")).length],
        ["Map lane", assets.filter(a => a.lanes.includes("map")).length],
        ["Rejected", registry.rejected_assets.length]
      ];
      const root = document.getElementById("summary");
      root.replaceChildren(...counts.map(([label, value]) => {
        const box = document.createElement("div");
        box.className = "metric";
        box.innerHTML = `<b>${value}</b><span>${label}</span>`;
        return box;
      }));
    }

    function renderAsset(asset) {
      const card = document.createElement("article");
      card.className = "asset";

      if (asset.thumbnail) {
        const img = document.createElement("img");
        img.loading = "lazy";
        img.alt = asset.title;
        img.src = asset.thumbnail;
        card.appendChild(img);
      } else {
        const fallback = document.createElement("div");
        fallback.className = "image-fallback";
        fallback.textContent = asset.source || "Approved asset";
        card.appendChild(fallback);
      }

      const body = document.createElement("div");
      body.className = "body";

      const title = document.createElement("h2");
      title.textContent = asset.title;
      body.appendChild(title);

      const url = document.createElement("a");
      url.href = asset.url;
      url.target = "_blank";
      url.rel = "noopener noreferrer";
      url.textContent = asset.url;
      body.appendChild(url);

      const chips = document.createElement("div");
      chips.className = "chips";
      chips.appendChild(chip(approvalLabels[asset.approval] || asset.approval, asset.approval));
      (asset.lanes || []).forEach(lane => chips.appendChild(chip(lane)));
      (asset.factions || []).forEach(faction => chips.appendChild(chip(faction)));
      if (asset.thumbnail_quality) chips.appendChild(chip(asset.thumbnail_quality, "thumbnail"));
      if (asset.thumbnail_status) chips.appendChild(chip(asset.thumbnail_status, "thumbnail"));
      if ((asset.notes || "").toLowerCase().includes("ai-generated")) chips.appendChild(chip("AI caution", "ai"));
      body.appendChild(chips);

      const rows = [
        ["Current use", asset.current_use],
        ["Local status", asset.local_status],
        ["Thumbnail note", asset.thumbnail_note],
        ["Notes", asset.notes],
        ["Local path", asset.local_path || ""]
      ].filter(([, value]) => value);

      rows.forEach(([label, value]) => {
        const wrap = document.createElement("div");
        const l = document.createElement("div");
        l.className = "label";
        l.textContent = label;
        const v = document.createElement("div");
        v.className = "value";
        v.textContent = value;
        wrap.append(l, v);
        body.appendChild(wrap);
      });

      card.appendChild(body);
      return card;
    }

    function renderRejected() {
      const root = document.getElementById("rejected");
      root.replaceChildren(...registry.rejected_assets.map(asset => {
        const div = document.createElement("div");
        div.className = "rejected-item";
        div.innerHTML = `<strong>${asset.title}</strong><br><a href="${asset.url}" target="_blank" rel="noopener noreferrer">${asset.url}</a><br><span>${asset.reason}</span>`;
        return div;
      }));
    }

    function render() {
      const list = filteredAssets();
      renderSummary(list);
      document.getElementById("grid").replaceChildren(...list.map(renderAsset));
    }

    Object.values(filters).forEach(input => input.addEventListener("input", render));
    renderRejected();
    render();
  </script>
</body>
</html>
